<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FloodStream Reset</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
    -webkit-user-select: none;
    user-select: none;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.5px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  #status {
    font-size: 13px;
    color: #666;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
    min-height: 60px;
    white-space: pre-line;
  }
  .bots {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .bot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .bot-label {
    font-size: 11px;
    color: #555;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .reset-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #333;
    background: #1a1a1a;
    color: #ff4444;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.3;
  }
  .reset-btn:active {
    transform: scale(0.95);
    background: #2a1010;
    border-color: #ff4444;
  }
  .reset-btn.working {
    border-color: #ff8800;
    color: #ff8800;
    animation: pulse 1s ease-in-out infinite;
  }
  .reset-btn.done {
    border-color: #00cc66;
    color: #00cc66;
  }
  .reset-btn.fail {
    border-color: #ff4444;
    color: #ff4444;
    background: #1a0000;
  }
  .bot-status {
    font-size: 12px;
    color: #555;
    text-align: center;
    min-height: 16px;
    letter-spacing: 0.3px;
  }
  .bot-status.online { color: #00cc66; }
  .bot-status.offline { color: #ff4444; }
</style>
</head>
<body>

<h1>FLOODSTREAM</h1>

<div class="bots">
  <div class="bot-col">
    <div class="bot-label">Floodstream</div>
    <button id="reset-btn" class="reset-btn">RESET
BOT</button>
    <div id="fs-status" class="bot-status">checking...</div>
  </div>
  <div class="bot-col">
    <div class="bot-label">Telegram</div>
    <button id="tg-reset-btn" class="reset-btn" style="color:#4488ff;border-color:#224;">RESTART
BOT</button>
    <div id="tg-status" class="bot-status">checking...</div>
  </div>
</div>

<div id="status">tap to restart a bot</div>

<script>
var TOKEN = "floodstream-reset-2026";

// Auto-detect base URL — works at http://IP:8787/, https://thetower.one/reset/, and file://
var BASE;
if (location.protocol === "file:") {
  BASE = "http://198.211.98.177:8787";
} else {
  var path = location.pathname.replace(/\/$/, "").replace(/\/index\.html$/, "");
  BASE = location.origin + path;
}

var actionStatus = document.getElementById("status");

function setIndicator(el, text) {
  // Check for RUNNING/ONLINE but not if OFFLINE appears later (webhook down)
  var hasOnline = /RUNNING|ONLINE/i.test(text);
  var hasOffline = /OFFLINE|DOWN|unreachable/i.test(text);
  var online = hasOnline && !hasOffline;
  el.className = "bot-status " + (online ? "online" : "offline");
  el.textContent = online ? "online" : "offline";
}

function pollStatus(statusPath, indicatorId) {
  var el = document.getElementById(indicatorId);
  fetch(BASE + statusPath, { headers: { "Authorization": "Bearer " + TOKEN } })
    .then(function(res) { return res.json(); })
    .then(function(data) { setIndicator(el, data.output || ""); })
    .catch(function() { el.className = "bot-status offline"; el.textContent = "unreachable"; });
}

function makeBot(btnId, indicatorId, resetPath, statusPath, idleText) {
  var btn = document.getElementById(btnId);
  var working = false;
  var idleClass = btn.className;

  function setBtn(text, extra) {
    btn.textContent = text;
    btn.className = "reset-btn" + (extra ? " " + extra : "");
  }

  btn.addEventListener("click", function() {
    if (working) return;
    working = true;
    setBtn("RESTARTING...", "working");
    actionStatus.textContent = "restarting...";

    fetch(BASE + resetPath, { method: "POST", headers: { "Authorization": "Bearer " + TOKEN } })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        setBtn("DONE", "done");
        actionStatus.textContent = "restarted ok";
        setTimeout(function() {
          btn.className = idleClass; btn.textContent = idleText;
          actionStatus.textContent = "";
          pollStatus(statusPath, indicatorId);
        }, 5000);
      } else {
        setBtn("FAILED", "fail");
        actionStatus.textContent = data.errors || data.output || data.error || "restart failed";
        setTimeout(function() { btn.className = idleClass; btn.textContent = idleText; }, 8000);
      }
      working = false;
    })
    .catch(function(e) {
      setBtn("ERROR", "fail");
      actionStatus.textContent = "can't reach VM";
      setTimeout(function() { btn.className = idleClass; btn.textContent = idleText; }, 5000);
      working = false;
    });
  });

  pollStatus(statusPath, indicatorId);
  setInterval(function() { if (!working) pollStatus(statusPath, indicatorId); }, 30000);
}

makeBot("reset-btn",    "fs-status", "/reset",          "/status",          "RESET\nBOT");
makeBot("tg-reset-btn", "tg-status", "/telegram-reset", "/telegram-status", "RESTART\nBOT");
</script>

</body>
</html>
